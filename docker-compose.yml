services:
  backend:
    build:
      context: ./backend
    container_name: ghost-hvac-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: ghost-hvac-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
